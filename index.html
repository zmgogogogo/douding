<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0058BC">
<meta name="description" content="拼豆图纸设计工具，在线绘制像素风格拼豆图案">
<meta name="keywords" content="拼豆,拼豆图纸,像素画,拼豆设计">
<title>豆猫 - 在线拼豆图纸工具</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --primary: #0058BC; --primary-rgb: 0,88,188; --primary-light: #e8f0fa;
  --bg: #f3f4f6; --surface: #fff; --surface2: #f8fafc;
  --border: #e5e7eb; --text: #1e293b; --text2: #64748b; --text3: #94a3b8;
  --danger: #ef4444; --danger-light: #fef2f2; --shadow: 0 4px 24px rgba(0,0,0,.08);
  --radius: 12px; --radius-sm: 8px; --font: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;
  --nav-h: 48px; --bottom-h: 52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
button{border:none;background:none;cursor:pointer;font-family:inherit;color:inherit}
input{font-family:inherit;outline:none}

/* ===== App Shell ===== */
.app{display:flex;flex-direction:column;height:100%;position:relative}
.topbar{display:flex;align-items:center;gap:6px;height:var(--nav-h);padding:0 10px;background:var(--surface);border-bottom:1px solid var(--border);z-index:100;flex-shrink:0}
.topbar .logo{font-size:20px;margin-right:2px}
.topbar .brand{font-size:15px;font-weight:700;color:var(--primary);margin-right:4px}
.topbar .sep{flex:1}
.topbar .ver{font-size:10px;color:var(--text3)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;height:32px;padding:0 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;transition:all .12s;white-space:nowrap;position:relative}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#004a9e;background:color-mix(in srgb,var(--primary) 88%,#000)}
.btn-danger{color:var(--danger);background:var(--danger-light)}
.btn-icon{width:32px;height:32px;padding:0;font-size:16px;border-radius:var(--radius-sm)}
.btn-icon.active{background:var(--primary-light);color:var(--primary)}
.btn-badge{position:absolute;top:-2px;right:-4px;background:var(--danger);color:#fff;font-size:9px;min-width:15px;height:15px;border-radius:8px;padding:0 4px;line-height:15px;font-weight:700}

.tool-sep{width:1px;height:20px;background:var(--border);margin:0 4px}

/* ===== Main Area ===== */
.main{flex:1;display:flex;overflow:hidden;position:relative;min-height:0}

/* ===== Left Toolbar ===== */
.toolbar{display:flex;flex-direction:column;gap:4px;padding:8px 6px;background:var(--surface);border-right:1px solid var(--border);z-index:50;overflow-y:auto;width:48px;min-width:48px}
.tool-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:17px;color:var(--text2);transition:all .12s;position:relative}
.tool-btn:hover{background:var(--surface2);color:var(--text)}
.tool-btn.active{background:var(--primary-light);color:var(--primary)}
.tool-btn .tip{position:absolute;left:44px;background:var(--text);color:#fff;font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200}
.tool-btn:hover .tip{opacity:1}

.tool-options{padding:4px 0;border-top:1px solid var(--border);margin-top:4px;display:flex;flex-direction:column;gap:4px}
.tool-options label{font-size:9px;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:.5px}
.tool-options input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.tool-options input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--primary);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.size-val{font-size:10px;text-align:center;color:var(--text2);font-weight:600}

/* ===== Canvas Container ===== */
.canvas-container{flex:1;position:relative;overflow:hidden;background:#e2e8f0;background-image:radial-gradient(circle,#cbd5e1 1px,transparent 1px);background-size:20px 20px;cursor:crosshair}
.canvas-container.grabbing{cursor:grabbing}
.canvas-container.panning{cursor:grab}
.canvas-container.erasing{cursor:cell}

#mainCanvas{display:block;position:absolute;top:0;left:0;image-rendering:pixelated}
#gridCanvas{display:block;position:absolute;top:0;left:0;pointer-events:none;image-rendering:pixelated}
#refCanvas{display:block;position:absolute;top:0;left:0;pointer-events:none}

/* ===== Right Panel ===== */
.panel-right{width:220px;min-width:220px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:50}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-tab{flex:1;height:36px;font-size:11px;font-weight:600;color:var(--text2);display:flex;align-items:center;justify-content:center;border-bottom:2px solid transparent;transition:all .12s}
.panel-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.panel-body{flex:1;overflow-y:auto;padding:8px}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== Color Palette ===== */
.brand-select{width:100%;height:32px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 8px;font-size:12px;font-weight:600;background:var(--surface);color:var(--text);margin-bottom:6px;cursor:pointer}
.series-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px}
.series-chip{height:26px;padding:0 8px;border-radius:13px;font-size:10px;font-weight:600;background:var(--surface2);color:var(--text2);border:1px solid transparent;transition:all .12s;white-space:nowrap}
.series-chip:hover{border-color:var(--border)}
.series-chip.active{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
.color-grid{display:flex;flex-wrap:wrap;gap:4px}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;position:relative;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.1)}
.color-dot:hover{transform:scale(1.15);z-index:2;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08),0 3px 8px rgba(0,0,0,.18)}
.color-dot.selected{border-color:var(--primary);transform:scale(1.15);z-index:2;box-shadow:0 0 0 3px rgba(var(--primary-rgb),.25)}
.color-dot .usage{position:absolute;bottom:-2px;right:-2px;background:var(--danger);color:#fff;font-size:7px;min-width:14px;height:14px;border-radius:7px;text-align:center;line-height:14px;font-weight:700}
.color-dot .name-tip{position:absolute;top:-24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s}
.color-dot:hover .name-tip{opacity:1}

.current-color{display:flex;align-items:center;gap:8px;padding:8px;background:var(--surface2);border-radius:var(--radius-sm);margin-top:8px}
.current-color .swatch{width:32px;height:32px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.15);flex-shrink:0}
.current-color .info{font-size:11px;min-width:0}
.current-color .info .cname{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.current-color .info .chex{color:var(--text3);font-size:10px}

/* ===== Color Picker ===== */
.picker-wrap{padding:8px}
.picker-sb{position:relative;width:100%;height:140px;border-radius:var(--radius-sm);cursor:crosshair;margin-bottom:8px;overflow:hidden}
.picker-sb canvas{width:100%;height:100%;display:block}
.picker-sb .cursor{position:absolute;width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px rgba(0,0,0,.3),0 2px 6px rgba(0,0,0,.25);pointer-events:none;transform:translate(-50%,-50%)}
.picker-hue{position:relative;width:100%;height:12px;border-radius:6px;cursor:pointer;margin-bottom:8px}
.picker-hue canvas{width:100%;height:100%;display:block;border-radius:6px}
.picker-hue .thumb{position:absolute;width:18px;height:18px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);top:50%;transform:translate(-50%,-50%);pointer-events:none}
.hex-row{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 8px}
.hex-row span{color:var(--text3);font-size:11px;font-weight:600}
.hex-row input{flex:1;border:none;background:none;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text);min-width:0}
.hex-row .hex-swatch{width:18px;height:18px;border-radius:4px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}

/* ===== Image Import Panel ===== */
.import-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all .12s;margin-bottom:8px}
.import-zone:hover{border-color:var(--primary);background:var(--primary-light)}
.import-zone .icon{font-size:32px;margin-bottom:4px}
.import-zone .label{font-size:12px;color:var(--text2)}
.import-zone .sub{font-size:10px;color:var(--text3);margin-top:2px}
.import-preview{text-align:center;margin-bottom:8px}
.import-preview img{max-width:100%;max-height:120px;border-radius:var(--radius-sm);box-shadow:var(--shadow)}
.import-controls{display:flex;flex-direction:column;gap:6px}
.import-controls label{font-size:11px;color:var(--text2);display:flex;justify-content:space-between}
.import-controls input[type=range]{width:100%}

/* ===== Bottom Bar ===== */
.bottombar{display:flex;align-items:center;gap:12px;height:var(--bottom-h);padding:0 12px;background:var(--surface);border-top:1px solid var(--border);font-size:11px;color:var(--text2);flex-shrink:0;overflow-x:auto}
.bottombar .stat{white-space:nowrap}
.bottombar .stat strong{color:var(--text)}

/* ===== Overlay / Modal ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500;display:flex;align-items:center;justify-content:center}
.overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);padding:20px;max-width:400px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:12px}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ===== Toast ===== */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* ===== Responsive ===== */
@media(max-width:768px){
  .panel-right{position:fixed;right:0;top:var(--nav-h);bottom:var(--bottom-h);width:240px;transform:translateX(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);box-shadow:var(--shadow)}
  .panel-right.open{transform:translateX(0)}
  .toolbar{width:40px;min-width:40px;padding:6px 3px}
  .tool-btn{width:32px;height:32px;font-size:15px}
  .tool-options{display:none}
  .topbar{gap:4px;padding:0 6px}
  .topbar .brand{font-size:13px}
  .btn{font-size:11px;height:28px;padding:0 6px}
  .bottombar{font-size:10px;gap:8px}
  .tool-btn .tip{display:none}
}
</style>
</head>
<body>

<div class="app">
  <!-- Top Bar -->
  <div class="topbar">
    <span class="logo">🧩</span>
    <span class="brand">豆猫</span>
    <span class="sep"></span>
    <button class="btn btn-icon" id="btnUndo" title="撤销 Ctrl+Z">↩</button>
    <button class="btn btn-icon" id="btnRedo" title="重做 Ctrl+Y">↪</button>
    <span class="tool-sep"></span>
    <button class="btn btn-icon" id="btnZoomIn" title="放大">🔍</button>
    <button class="btn btn-icon" id="btnZoomOut" title="缩小">🔎</button>
    <button class="btn" id="btnZoomFit">适应</button>
    <span class="tool-sep"></span>
    <button class="btn btn-icon" id="btnGrid" title="网格线">📐</button>
    <button class="btn btn-icon" id="btnMirrorH" title="水平镜像">↔</button>
    <button class="btn btn-icon" id="btnMirrorV" title="垂直镜像">↕</button>
    <span class="tool-sep"></span>
    <button class="btn" id="btnImport">📷 导入图片</button>
    <button class="btn" id="btnPanel">🎨 调色板</button>
    <span class="tool-sep"></span>
    <button class="btn btn-primary" id="btnExport">📥 导出</button>
    <button class="btn btn-icon" id="btnClear" title="清空">🗑</button>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Left Toolbar -->
    <div class="toolbar" id="toolbar">
      <button class="tool-btn active" data-tool="brush" id="toolBrush">
        ✏️<span class="tip">画笔 (B)</span>
      </button>
      <button class="tool-btn" data-tool="eraser" id="toolEraser">
        🧹<span class="tip">橡皮 (E)</span>
      </button>
      <button class="tool-btn" data-tool="fill" id="toolFill">
        🪣<span class="tip">填充 (G)</span>
      </button>
      <button class="tool-btn" data-tool="picker" id="toolPicker">
        💉<span class="tip">吸色 (I)</span>
      </button>
      <button class="tool-btn" data-tool="move" id="toolMove">
        ✋<span class="tip">移动 (M)</span>
      </button>
      <div class="tool-options" id="brushSizeGroup">
        <label>笔刷大小</label>
        <input type="range" id="brushSize" min="1" max="5" value="1">
        <div class="size-val" id="brushSizeVal">1</div>
      </div>
      <div class="tool-options" id="eraserSizeGroup" style="display:none">
        <label>橡皮大小</label>
        <input type="range" id="eraserSize" min="1" max="5" value="1">
        <div class="size-val" id="eraserSizeVal">1</div>
      </div>
      <div style="flex:1"></div>
      <button class="tool-btn" id="btnSave" title="保存 Ctrl+S" style="margin-top:auto">💾</button>
      <button class="tool-btn" id="btnLoad" title="加载 Ctrl+O">📂</button>
    </div>

    <!-- Canvas -->
    <div class="canvas-container" id="canvasContainer">
      <canvas id="refCanvas"></canvas>
      <canvas id="mainCanvas"></canvas>
      <canvas id="gridCanvas"></canvas>
    </div>

    <!-- Right Panel -->
    <div class="panel-right" id="panelRight">
      <div class="panel-tabs">
        <button class="panel-tab active" data-tab="palette">🎨 颜色</button>
        <button class="panel-tab" data-tab="picker">🌈 调色</button>
        <button class="panel-tab" data-tab="import">📷 导入</button>
      </div>
      <div class="panel-body" id="panelBody">
        <!-- Palette Tab -->
        <div id="tab-palette">
          <select class="brand-select" id="brandSelect"></select>
          <div class="series-tabs" id="seriesTabs"></div>
          <div class="color-grid" id="colorGrid"></div>
          <div class="current-color" id="currentColorDisplay">
            <div class="swatch" id="currentSwatch" style="background:#1A1A1A"></div>
            <div class="info">
              <div class="cname" id="currentColorName">Black</div>
              <div class="chex" id="currentColorHex">#1A1A1A</div>
            </div>
          </div>
        </div>
        <!-- Picker Tab -->
        <div id="tab-picker" style="display:none">
          <div class="picker-wrap">
            <div class="picker-sb" id="pickerSB">
              <canvas id="pickerSBCanvas"></canvas>
              <div class="cursor" id="pickerSBCursor"></div>
            </div>
            <div class="picker-hue" id="pickerHue">
              <canvas id="pickerHueCanvas"></canvas>
              <div class="thumb" id="pickerHueThumb"></div>
            </div>
            <div class="hex-row">
              <span>#</span>
              <input type="text" id="hexInput" maxlength="6" value="1A1A1A">
              <div class="hex-swatch" id="hexSwatch" style="background:#1A1A1A"></div>
            </div>
          </div>
        </div>
        <!-- Import Tab -->
        <div id="tab-import" style="display:none">
          <div class="import-zone" id="importZone">
            <div class="icon">📷</div>
            <div class="label">点击或拖拽上传图片</div>
            <div class="sub">自动转换为拼豆图纸</div>
          </div>
          <input type="file" id="importFile" accept="image/*" style="display:none">
          <div class="import-preview hidden" id="importPreviewWrap">
            <img id="importPreviewImg" src="">
          </div>
          <div class="import-controls">
            <label>目标宽度 <span id="targetWidthVal">58</span> 格</label>
            <input type="range" id="targetWidth" min="10" max="150" value="58">
            <label>颜色简化 <span id="simplifyVal">中等</span></label>
            <input type="range" id="simplify" min="1" max="5" value="3">
            <label>参考图透明度</label>
            <input type="range" id="refOpacity" min="10" max="100" value="40">
            <div style="display:flex;gap:6px;margin-top:6px">
              <button class="btn btn-primary" id="btnApplyImport" style="flex:1">应用到画布</button>
              <button class="btn" id="btnClearRef">清除参考图</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottombar">
    <span class="stat">画板：<strong id="statSize">58×58</strong></span>
    <span class="stat">已放置：<strong id="statPlaced">0</strong> 颗</span>
    <span class="stat">颜色数：<strong id="statColors">0</strong></span>
    <span class="stat">缩放：<strong id="statZoom">100%</strong></span>
    <span class="sep" style="flex:1"></span>
    <span class="stat" id="statPos"></span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Image import hidden file input handled inline -->

function getAllColors(){let r=[];for(let b of BEAD_DB)for(let s of b.series)for(let c of s.colors)r.push({...c,brand:b.name,series:s.name});return r}
function findNearestColor(hex){let all=getAllColors(),t=hexToRgb(hex),best=all[0],bestD=Infinity;for(let c of all){let d=colorDist(t,hexToRgb(c.hex));if(d<bestD){bestD=d;best=c}}return best}

// ============ COLOR UTILS ============
function hexToRgb(h){let s=h.replace('#','');return{r:parseInt(s.substring(0,2),16),g:parseInt(s.substring(2,4),16),b:parseInt(s.substring(4,6),16)}}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(x=>Math.max(0,Math.min(255,x)).toString(16).padStart(2,'0')).join('').toUpperCase()}
function colorDist(a,b){let dr=a.r-b.r,dg=a.g-b.g,db=a.b-b.b;return dr*dr*2+dg*dg*3+db*db}
function hslToRgb(h,s,l){h/=360;let r,g,b;if(s===0)r=g=b=l;else{let q=l<.5?l*(1+s):l+s-l*s,p=2*l-q;let t3=(t)=>{if(t<0)t+=1;if(t>1)t-=1;return t<1/6?p+(q-p)*6*t:t<.5?q:t<2/3?p+(q-p)*(2/3-t)*6:p};r=t3(h+1/3);g=t3(h);b=t3(h-1/3)}return{r:Math.round(r*255),g:Math.round(g*255),b:Math.round(b*255)}}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;let max=Math.max(r,g,b),min=Math.min(r,g,b),h,s,l=(max+min)/2;if(max===min)h=s=0;else{let d=max-min;s=l>.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}}

// ============ APP STATE ============
const GRID_DEFAULT = 58;
let state={
  gridW:GRID_DEFAULT, gridH:GRID_DEFAULT,
  grid:[], // grid[row][col] = {id,name,hex,brand,series} | null
  zoom:1, panX:0, panY:0,
  tool:'brush', brushSize:1, eraserSize:1,
  curColor:{id:6,name:'Black',hex:'#1A1A1A',brand:'Hama',series:'经典色'},
  mirrorH:false, mirrorV:false,
  showGrid:true, gridOpacity:.4, gridSplit:1,
  refImage:null, refOpacity:.4, refPixels:null, refW:0, refH:0,
  history:[], historyIdx:-1, maxHistory:200,
  isDrawing:false, lastCell:null,
  pickerHue:0, pickerSat:100, pickerLit:50,
};
let gridCanvas, gridCtx, mainCanvas, mainCtx, refCanvas, refCtx;

// ============ INIT ============
function init(){
  mainCanvas=document.getElementById('mainCanvas');
  mainCtx=mainCanvas.getContext('2d',{willReadFrequently:true});
  gridCanvas=document.getElementById('gridCanvas');
  gridCtx=gridCanvas.getContext('2d');
  refCanvas=document.getElementById('refCanvas');
  refCtx=refCanvas.getContext('2d');

  state.grid=createGrid(state.gridW,state.gridH);
  saveSnapshot();
  buildUI();
  bindEvents();
  updateCanvasSize();
  renderAll();
  updateStatus();
  updateColorDisplay();
}
function createGrid(w,h){return Array.from({length:h},()=>Array(w).fill(null))}

// ============ HISTORY ============
function saveSnapshot(){
  let snap=state.grid.map(r=>r.map(c=>c?{...c}:null));
  state.history=state.history.slice(0,state.historyIdx+1);
  state.history.push({grid:snap,w:state.gridW,h:state.gridH});
  if(state.history.length>state.maxHistory)state.history.shift();
  state.historyIdx=state.history.length-1;
}
function undo(){
  if(state.historyIdx<=0)return;
  state.historyIdx--;restore(state.history[state.historyIdx]);
  document.getElementById('btnUndo').classList.toggle('active',state.historyIdx>0);
}
function redo(){
  if(state.historyIdx>=state.history.length-1)return;
  state.historyIdx++;restore(state.history[state.historyIdx]);
}
function restore(snap){
  if(snap.w!==state.gridW||snap.h!==state.gridH){state.gridW=snap.w;state.gridH=snap.h}
  state.grid=snap.grid.map(r=>r.map(c=>c?{...c}:null));
  updateCanvasSize();renderAll();updateStatus();
}

// ============ CANVAS ============
function updateCanvasSize(){
  let dpr=window.devicePixelRatio||1;
  let w=state.gridW*state.zoom, h=state.gridH*state.zoom;
  let iw=state.gridW*dpr, ih=state.gridH*dpr;
  [mainCanvas,gridCanvas,refCanvas].forEach(c=>{c.width=iw;c.height=ih});
  mainCtx.setTransform(dpr,0,0,dpr,0,0);mainCtx.imageSmoothingEnabled=false;
  gridCtx.setTransform(dpr,0,0,dpr,0,0);
  refCtx.setTransform(dpr,0,0,dpr,0,0);
  positionCanvases();
}
function positionCanvases(){
  let ct=document.getElementById('canvasContainer');
  let cx=ct.clientWidth/2+state.panX-state.gridW*state.zoom/2;
  let cy=ct.clientHeight/2+state.panY-state.gridH*state.zoom/2;
  [mainCanvas,gridCanvas,refCanvas].forEach(c=>{c.style.left=cx+'px';c.style.top=cy+'px';c.style.width=(state.gridW*state.zoom)+'px';c.style.height=(state.gridH*state.zoom)+'px'});
}
function renderAll(){renderGrid();renderGridOverlay();renderRef();updateStatus()}
function renderGrid(){
  let dpr=window.devicePixelRatio||1;
  mainCtx.setTransform(dpr,0,0,dpr,0,0);
  mainCtx.clearRect(0,0,state.gridW,state.gridH);
  let imgData=mainCtx.createImageData(state.gridW,state.gridH);
  for(let r=0;r<state.gridH;r++)for(let c=0;c<state.gridW;c++){
    let cell=state.grid[r][c];
    let idx=(r*state.gridW+c)*4;
    if(cell){let rgb=hexToRgb(cell.hex);imgData.data[idx]=rgb.r;imgData.data[idx+1]=rgb.g;imgData.data[idx+2]=rgb.b;imgData.data[idx+3]=255}
    else{imgData.data[idx]=0;imgData.data[idx+1]=0;imgData.data[idx+2]=0;imgData.data[idx+3]=0}
  }
  mainCtx.putImageData(imgData,0,0);
}
function renderGridOverlay(){
  let dpr=window.devicePixelRatio||1;
  gridCtx.setTransform(dpr,0,0,dpr,0,0);
  gridCtx.clearRect(0,0,state.gridW,state.gridH);
  if(!state.showGrid)return;
  gridCtx.strokeStyle=`rgba(0,0,0,${state.gridOpacity})`;
  gridCtx.lineWidth=.5;
  let step=state.gridSplit;
  for(let r=0;r<=state.gridH;r+=step){gridCtx.beginPath();gridCtx.moveTo(0,r);gridCtx.lineTo(state.gridW,r);gridCtx.stroke()}
  for(let c=0;c<=state.gridW;c+=step){gridCtx.beginPath();gridCtx.moveTo(c,0);gridCtx.lineTo(c,state.gridH);gridCtx.stroke()}
}
function renderRef(){
  let dpr=window.devicePixelRatio||1;
  refCtx.setTransform(dpr,0,0,dpr,0,0);
  refCtx.clearRect(0,0,state.gridW,state.gridH);
  if(!state.refImage||!state.refPixels)return;
  refCtx.globalAlpha=state.refOpacity;
  let imgData=refCtx.createImageData(state.gridW,state.gridH);
  for(let r=0;r<Math.min(state.gridH,state.refH);r++)for(let c=0;c<Math.min(state.gridW,state.refW);c++){
    let px=state.refPixels[r]?.[c];if(!px)continue;
    let idx=(r*state.gridW+c)*4;
    imgData.data[idx]=px.r;imgData.data[idx+1]=px.g;imgData.data[idx+2]=px.b;imgData.data[idx+3]=255;
  }
  refCtx.putImageData(imgData,0,0);
  refCtx.globalAlpha=1;
}

// ============ GRID DRAWING ============
function getCell(ex,ey){
  let rect=mainCanvas.getBoundingClientRect();
  let col=Math.floor((ex-rect.left)/state.zoom), row=Math.floor((ey-rect.top)/state.zoom);
  if(col<0||col>=state.gridW||row<0||row>=state.gridH)return null;
  return{row,col};
}
function setCell(r,c,color){
  if(r<0||r>=state.gridH||c<0||c>=state.gridW)return;
  let old=state.grid[r][c];
  if(old&&color&&old.hex===color.hex)return;
  if(!old&&!color)return;
  state.grid[r][c]=color?{...color}:null;
}
function getCellColor(r,c){
  if(r<0||r>=state.gridH||c<0||c>=state.gridW)return null;
  return state.grid[r][c];
}
function drawAt(row,col){
  if(state.tool==='brush'&&state.curColor){
    let changed=false;
    for(let dr=-state.brushSize+1;dr<state.brushSize;dr++)
      for(let dc=-state.brushSize+1;dc<state.brushSize;dc++){
        let r=row+dr,c=col+dc;
        if(r<0||r>=state.gridH||c<0||c>=state.gridW)continue;
        let old=getCellColor(r,c);
        if(old&&old.hex===state.curColor.hex)continue;
        setCell(r,c,state.curColor);changed=true;
        // Mirror
        if(state.mirrorH){let mc=state.gridW-1-c;if(mc>=0&&mc<state.gridW)setCell(r,mc,state.curColor)}
        if(state.mirrorV){let mr=state.gridH-1-r;if(mr>=0&&mr<state.gridH)setCell(mr,c,state.curColor)}
        if(state.mirrorH&&state.mirrorV){let mc=state.gridW-1-c,mr=state.gridH-1-r;if(mc>=0&&mc<state.gridW&&mr>=0&&mr<state.gridH)setCell(mr,mc,state.curColor)}
      }
    return changed;
  }
  if(state.tool==='eraser'){
    let changed=false;
    for(let dr=-state.eraserSize+1;dr<state.eraserSize;dr++)
      for(let dc=-state.eraserSize+1;dc<state.eraserSize;dc++){
        let r=row+dr,c=col+dc;
        if(r<0||r>=state.gridH||c<0||c>=state.gridW)continue;
        if(!getCellColor(r,c))continue;
        setCell(r,c,null);changed=true;
      }
    return changed;
  }
  if(state.tool==='fill')return floodFill(row,col);
  if(state.tool==='picker'){let cell=getCellColor(row,col);if(cell){state.curColor=cell;setTool('brush');updateColorDisplay();}return false}
  return false;
}
function floodFill(sr,sc){
  let target=getCellColor(sr,sc),fill=state.curColor;
  let tHex=target?target.hex:null,fHex=fill?fill.hex:null;
  if(tHex===fHex)return false;
  if(!fill)return false;
  let stack=[[sr,sc]],visited=new Set(),changed=false;
  while(stack.length){
    let[r,c]=stack.pop(),k=`${r},${c}`;
    if(visited.has(k))continue;
    if(r<0||r>=state.gridH||c<0||c>=state.gridW)continue;
    let cell=getCellColor(r,c),ch=cell?cell.hex:null;
    if(ch!==tHex)continue;
    visited.add(k);setCell(r,c,fill);changed=true;
    stack.push([r-1,c],[r+1,c],[r,c-1],[r,c+1]);
  }
  return changed;
}

// ============ EVENTS ============
let dragStart=null, dragPanStart=null;
function onPointerDown(e){
  if(e.button===2){e.preventDefault();if(state.tool!=='move'){let cell=getCell(e.clientX,e.clientY);if(cell){let c=getCellColor(cell.row,cell.col);if(c){setCell(cell.row,cell.col,null);saveSnapshot();renderAll();}}}return}
  if(e.button!==0)return;
  if(state.tool==='move'){dragPanStart={x:e.clientX-state.panX,y:e.clientY-state.panY};return}
  let cell=getCell(e.clientX,e.clientY);
  if(!cell)return;
  state.isDrawing=true;
  let changed=drawAt(cell.row,cell.col);
  state.lastCell=cell;
  if(changed){saveSnapshot();renderAll()}
}
function onPointerMove(e){
  let cell=getCell(e.clientX,e.clientY);
  // Update status position
  if(cell)document.getElementById('statPos').textContent=`${cell.col},${cell.row}`;
  else document.getElementById('statPos').textContent='';
  // Pan with move tool
  if(state.tool==='move'&&dragPanStart){
    state.panX=e.clientX-dragPanStart.x;state.panY=e.clientY-dragPanStart.y;
    positionCanvases();return;
  }
  if(!state.isDrawing)return;
  if(!cell)return;
  if(state.lastCell&&state.lastCell.row===cell.row&&state.lastCell.col===cell.col)return;
  let changed=drawAt(cell.row,cell.col);
  state.lastCell=cell;
  if(changed){saveSnapshot();renderGrid();renderGridOverlay();renderRef()}
}
function onPointerUp(){
  state.isDrawing=false;state.lastCell=null;dragPanStart=null;
  updateStatus();
}
function onWheel(e){
  e.preventDefault();
  let ct=document.getElementById('canvasContainer');
  let ctRect=ct.getBoundingClientRect();
  let mx=e.clientX-ctRect.left-ct.clientWidth/2;
  let my=e.clientY-ctRect.top-ct.clientHeight/2;
  let delta=e.deltaY>0?.9:1.1;
  let newZ=Math.max(.1,Math.min(30,state.zoom*delta));
  state.panX-=mx*(newZ/state.zoom-1);
  state.panY-=my*(newZ/state.zoom-1);
  state.zoom=newZ;
  updateCanvasSize();renderAll();updateStatus();
}

// ============ TOOLS ============
function setTool(t){
  state.tool=t;
  document.querySelectorAll('#toolbar .tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));
  document.getElementById('brushSizeGroup').style.display=t==='brush'?'':'none';
  document.getElementById('eraserSizeGroup').style.display=t==='eraser'?'':'none';
  let ct=document.getElementById('canvasContainer');
  ct.classList.remove('grabbing','panning','erasing');
  if(t==='move')ct.classList.add('panning');
  if(t==='eraser')ct.classList.add('erasing');
}

// ============ BUILD UI ============
function buildUI(){
  // Brand select
  let bs=document.getElementById('brandSelect');
  bs.innerHTML=BEAD_DB.map(b=>`<option value="${b.name}">${b.name}</option>`).join('');
  bs.value=BEAD_DB[0].name;
  bs.onchange=()=>{updateSeriesTabs();updateColorGrid()};
  updateSeriesTabs();
  updateColorGrid();

  // Panel tabs
  document.querySelectorAll('.panel-tab').forEach(t=>t.addEventListener('click',()=>switchPanelTab(t.dataset.tab)));
  // Toolbar
  document.querySelectorAll('#toolbar .tool-btn').forEach(b=>b.addEventListener('click',()=>setTool(b.dataset.tool)));

  // Color picker
  state.pickerHue=0;state.pickerSat=100;state.pickerLit=50;
  buildPicker();
  updatePickerUI();

  // Controls
  document.getElementById('brushSize').addEventListener('input',function(){state.brushSize=parseInt(this.value);document.getElementById('brushSizeVal').textContent=this.value});
  document.getElementById('eraserSize').addEventListener('input',function(){state.eraserSize=parseInt(this.value);document.getElementById('eraserSizeVal').textContent=this.value});
}
function switchPanelTab(tab){
  document.querySelectorAll('.panel-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  ['palette','picker','import'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'':'none');
  if(tab==='picker')buildPicker();
}
function updateSeriesTabs(){
  let brand=BEAD_DB.find(b=>b.name===document.getElementById('brandSelect').value);
  if(!brand)return;
  let container=document.getElementById('seriesTabs');
  container.innerHTML=brand.series.map((s,i)=>`<button class="series-chip${i===0?' active':''}" data-sid="${s.id}">${s.name}</button>`).join('');
  container.querySelectorAll('.series-chip').forEach(ch=>ch.addEventListener('click',function(){
    container.querySelectorAll('.series-chip').forEach(c=>c.classList.remove('active'));
    this.classList.add('active');
    updateColorGrid();
  }));
}
function getActiveSeries(){let brand=BEAD_DB.find(b=>b.name===document.getElementById('brandSelect').value);if(!brand)return null;let active=document.querySelector('.series-chip.active');let sid=active?parseInt(active.dataset.sid):brand.series[0].id;return brand.series.find(s=>s.id===sid)||brand.series[0]}
function updateColorGrid(){
  let series=getActiveSeries(),brand=BEAD_DB.find(b=>b.name===document.getElementById('brandSelect').value);
  if(!series||!brand)return;
  // Count usage
  let usage={};for(let r=0;r<state.gridH;r++)for(let c=0;c<state.gridW;c++){let cell=state.grid[r][c];if(cell)usage[cell.hex]=(usage[cell.hex]||0)+1}
  let container=document.getElementById('colorGrid');
  container.innerHTML=series.colors.map(c=>`<div class="color-dot${state.curColor&&state.curColor.hex===c.hex?' selected':''}" style="background:${c.hex}" data-hex="${c.hex}" data-name="${c.name}" title="${c.name} ${c.hex}"><span class="name-tip">${c.name}</span>${usage[c.hex]?`<span class="usage">${usage[c.hex]}</span>`:''}</div>`).join('');
  container.querySelectorAll('.color-dot').forEach(dot=>dot.addEventListener('click',function(){
    let hex=this.dataset.hex,name=this.dataset.name;
    state.curColor={id:0,name,hex,brand:brand.name,series:series.name};
    if(state.tool==='eraser')setTool('brush');
    updateColorDisplay();
    updateColorGrid();
  }));
}
function updateColorDisplay(){
  let c=state.curColor||{name:'未选择',hex:'#CCC'};
  document.getElementById('currentSwatch').style.background=c.hex;
  document.getElementById('currentColorName').textContent=c.name;
  document.getElementById('currentColorHex').textContent=c.hex;
  document.getElementById('hexInput').value=c.hex.replace('#','');
  document.getElementById('hexSwatch').style.background=c.hex;
}

// ============ COLOR PICKER ============
function buildPicker(){
  let sbCanvas=document.getElementById('pickerSBCanvas'),sbCtx=sbCanvas.getContext('2d');
  let dpr=window.devicePixelRatio||1;
  let w=200,h=140;
  sbCanvas.width=w*dpr;sbCanvas.height=h*dpr;sbCanvas.style.width=w+'px';sbCanvas.style.height=h+'px';
  sbCtx.setTransform(dpr,0,0,dpr,0,0);
  // Draw SB
  let imgData=sbCtx.createImageData(w,h);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    let s=x/w*100,l=100-y/h*100;
    let rgb=hslToRgb(state.pickerHue,s,l);
    let idx=(y*w+x)*4;
    imgData.data[idx]=rgb.r;imgData.data[idx+1]=rgb.g;imgData.data[idx+2]=rgb.b;imgData.data[idx+3]=255;
  }
  sbCtx.putImageData(imgData,0,0);

  // Hue bar
  let hueCanvas=document.getElementById('pickerHueCanvas'),hueCtx=hueCanvas.getContext('2d');
  let hw=200,hh=12;
  hueCanvas.width=hw*dpr;hueCanvas.height=hh*dpr;hueCanvas.style.width=hw+'px';hueCanvas.style.height=hh+'px';
  hueCtx.setTransform(dpr,0,0,dpr,0,0);
  let hImg=hueCtx.createImageData(hw,hh);
  for(let x=0;x<hw;x++){let rgb=hslToRgb(x/hw*360,100,50);for(let y=0;y<hh;y++){let idx=(y*hw+x)*4;hImg.data[idx]=rgb.r;hImg.data[idx+1]=rgb.g;hImg.data[idx+2]=rgb.b;hImg.data[idx+3]=255}}
  hueCtx.putImageData(hImg,0,0);
  updatePickerUI();
}
function updatePickerUI(){
  let sb=document.getElementById('pickerSB'),hue=document.getElementById('pickerHue');
  let sbc=document.getElementById('pickerSBCursor'),ht=document.getElementById('pickerHueThumb');
  let w=200,h=140;
  let rgb=hslToRgb(state.pickerHue,state.pickerSat,state.pickerLit);
  sbc.style.background=rgbToHex(rgb.r,rgb.g,rgb.b);
  ht.style.left=(state.pickerHue/360*200)+'px';
  ht.style.background=`hsl(${state.pickerHue},100%,50%)`;
  let hex=rgbToHex(rgb.r,rgb.g,rgb.b);
  document.getElementById('hexInput').value=hex.replace('#','');
  document.getElementById('hexSwatch').style.background=hex;
}
// Picker SB events
document.getElementById('pickerSB').addEventListener('pointerdown',function(e){pickSB(e);this.setPointerCapture(e.pointerId);this.onpointermove=pickSB;this.onpointerup=()=>{this.onpointermove=null}});
function pickSB(e){let rect=e.target.getBoundingClientRect();let x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));let y=Math.max(0,Math.min(1,(e.clientY-rect.top)/rect.height));state.pickerSat=Math.round(x*100);state.pickerLit=Math.round((1-y)*100);updatePickerUI();applyPickerColor()}
// Hue events
document.getElementById('pickerHue').addEventListener('pointerdown',function(e){pickHue(e);this.setPointerCapture(e.pointerId);this.onpointermove=pickHue;this.onpointerup=()=>{this.onpointermove=null}});
function pickHue(e){let rect=e.target.getBoundingClientRect();let x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));state.pickerHue=Math.round(x*360);updatePickerUI();buildPicker();applyPickerColor()}
// Hex input
document.getElementById('hexInput').addEventListener('input',function(){let h=this.value.replace(/[^0-9a-fA-F]/g,'').substring(0,6);this.value=h;if(h.length===6){let rgb=hexToRgb('#'+h),hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);state.pickerHue=hsl.h;state.pickerSat=hsl.s;state.pickerLit=hsl.l;updatePickerUI();buildPicker();applyPickerColor()}});
function applyPickerColor(){
  let hex=document.getElementById('hexInput').value;
  if(hex.length!==6)return;
  hex='#'+hex.toUpperCase();
  let nearest=findNearestColor(hex);
  let brand=BEAD_DB.find(b=>b.name===document.getElementById('brandSelect').value);
  state.curColor={id:0,name:nearest.name,hex,brand:brand?brand.name:BEAD_DB[0].name,series:nearest.series||''};
  updateColorDisplay();
  if(state.tool==='eraser')setTool('brush');
  updateColorGrid();
}

// ============ IMAGE IMPORT ============
document.getElementById('importZone').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importZone').addEventListener('dragover',e=>{e.preventDefault();e.target.style.borderColor='var(--primary)'});
document.getElementById('importZone').addEventListener('dragleave',e=>{e.target.style.borderColor=''});
document.getElementById('importZone').addEventListener('drop',e=>{e.preventDefault();e.target.style.borderColor='';if(e.dataTransfer.files[0])processImage(e.dataTransfer.files[0])});
document.getElementById('importFile').addEventListener('change',function(){if(this.files[0])processImage(this.files[0])});
document.getElementById('targetWidth').addEventListener('input',function(){document.getElementById('targetWidthVal').textContent=this.value});
document.getElementById('simplify').addEventListener('input',function(){let v=['极少','少','中等','多','极多'];document.getElementById('simplifyVal').textContent=v[parseInt(this.value)-1]});
document.getElementById('refOpacity').addEventListener('input',function(){state.refOpacity=parseInt(this.value)/100;renderRef()});
document.getElementById('btnClearRef').addEventListener('click',()=>{state.refImage=null;state.refPixels=null;renderRef();showToast('参考图已清除')});
document.getElementById('btnApplyImport').addEventListener('click',applyImportToGrid);

function processImage(file){
  let reader=new FileReader();
  reader.onload=function(e){
    let img=new Image();
    img.onload=function(){
      let tw=parseInt(document.getElementById('targetWidth').value);
      let th=Math.round(tw*(img.height/img.width));
      // Pixelate
      let c=document.createElement('canvas');c.width=tw;c.height=th;
      let ctx=c.getContext('2d');ctx.drawImage(img,0,0,tw,th);
      let data=ctx.getImageData(0,0,tw,th).data;
      let pixels=Array.from({length:th},(_,r)=>Array.from({length:tw},(_,c2)=>{let i=(r*tw+c2)*4;return{r:data[i],g:data[i+1],b:data[i+2]}}));
      // Quantize to nearest bead colors
      let allC=getAllColors();
      let simplifyLevel=parseInt(document.getElementById('simplify').value);
      let paletteSize=[2,4,8,16,32][simplifyLevel-1];
      let qPixels=quantizeColors(pixels,tw,th,paletteSize,allC);
      state.refImage=img;
      state.refPixels=qPixels;state.refW=tw;state.refH=th;
      document.getElementById('importPreviewImg').src=c.toDataURL();
      document.getElementById('importPreviewWrap').classList.remove('hidden');
      renderRef();
      showToast(`已生成 ${tw}×${th} 参考图`);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function quantizeColors(pixels,w,h,k,allColors){
  // Simple K-means-like quantization + nearest bead matching
  let result=Array.from({length:h},(_,r)=>Array.from({length:w},(_,c)=>({...pixels[r][c]})));
  for(let r=0;r<h;r++)for(let c=0;c<w;c++){
    let px=pixels[r][c],best=allColors[0],bestD=Infinity;
    for(let cl of allColors){let d=colorDist(px,hexToRgb(cl.hex));if(d<bestD){bestD=d;best=cl}}
    let rgb=hexToRgb(best.hex);
    result[r][c]={r:rgb.r,g:rgb.g,b:rgb.b};
  }
  return result;
}
function applyImportToGrid(){
  if(!state.refPixels){showToast('请先导入图片');return}
  let tw=state.refW,th=state.refH;
  state.gridW=tw;state.gridH=th;state.grid=createGrid(tw,th);
  let allC=getAllColors();
  for(let r=0;r<th;r++)for(let c=0;c<tw;c++){
    let px=state.refPixels[r][c];
    let best=allC[0],bestD=Infinity;
    for(let cl of allC){let d=colorDist(px,hexToRgb(cl.hex));if(d<bestD){bestD=d;best=cl}}
    state.grid[r][c]={id:best.id,name:best.name,hex:best.hex,brand:best.brand,series:best.series};
  }
  state.refImage=null;state.refPixels=null;
  updateCanvasSize();saveSnapshot();renderAll();updateStatus();
  document.getElementById('importPreviewWrap').classList.add('hidden');
  showToast(`已应用参考图到画布 (${tw}×${th})`);
}

// ============ ACTIONS ============
document.getElementById('btnUndo').addEventListener('click',undo);
document.getElementById('btnRedo').addEventListener('click',redo);
document.getElementById('btnClear').addEventListener('click',()=>{if(confirm('确定清空画布？可撤销。')){state.grid=createGrid(state.gridW,state.gridH);saveSnapshot();renderAll();updateStatus()}});
document.getElementById('btnZoomIn').addEventListener('click',()=>{state.zoom=Math.min(30,state.zoom*1.25);updateCanvasSize();renderAll();updateStatus()});
document.getElementById('btnZoomOut').addEventListener('click',()=>{state.zoom=Math.max(.1,state.zoom*.8);updateCanvasSize();renderAll();updateStatus()});
document.getElementById('btnZoomFit').addEventListener('click',()=>{state.zoom=1;state.panX=0;state.panY=0;updateCanvasSize();renderAll();updateStatus()});
document.getElementById('btnGrid').addEventListener('click',function(){state.showGrid=!state.showGrid;this.classList.toggle('active',state.showGrid);renderGridOverlay()});
document.getElementById('btnMirrorH').addEventListener('click',function(){state.mirrorH=!state.mirrorH;this.classList.toggle('active',state.mirrorH)});
document.getElementById('btnMirrorV').addEventListener('click',function(){state.mirrorV=!state.mirrorV;this.classList.toggle('active',state.mirrorV)});
document.getElementById('btnPanel').addEventListener('click',()=>document.getElementById('panelRight').classList.toggle('open'));
document.getElementById('btnImport').addEventListener('click',()=>{switchPanelTab('import');document.getElementById('panelRight').classList.add('open')});
document.getElementById('btnSave').addEventListener('click',saveDesign);
document.getElementById('btnLoad').addEventListener('click',loadDesign);
document.getElementById('btnExport').addEventListener('click',exportPNG);
function exportPNG(){
  let scale=4;
  let ec=document.createElement('canvas');ec.width=state.gridW*scale;ec.height=state.gridH*scale;
  let ectx=ec.getContext('2d');ectx.imageSmoothingEnabled=false;
  // Draw beads as circles
  for(let r=0;r<state.gridH;r++)for(let c=0;c<state.gridW;c++){
    let cell=state.grid[r][c],cx=c*scale+scale/2,cy=r*scale+scale/2,rad=scale*.45;
    ectx.beginPath();ectx.arc(cx,cy,rad,0,Math.PI*2);
    if(cell){ectx.fillStyle=cell.hex;ectx.fill();ectx.strokeStyle='rgba(0,0,0,.2)';ectx.lineWidth=.5;ectx.stroke()}
    else{ectx.fillStyle='#f0f0f0';ectx.fill()}
  }
  let link=document.createElement('a');link.download=`拼豆图纸_${state.gridW}x${state.gridH}.png`;link.href=ec.toDataURL();link.click();
  showToast('已导出 PNG');
}

// ============ SAVE / LOAD ============
function saveDesign(){
  try{
    let data={w:state.gridW,h:state.gridH,grid:state.grid.map(r=>r.map(c=>c?{id:c.id,name:c.name,hex:c.hex,brand:c.brand,series:c.series}:null)),v:1};
    localStorage.setItem('doumao_design',JSON.stringify(data));
    showToast('💾 已保存 (Ctrl+S)');
  }catch(e){showToast('保存失败')}
}
function loadDesign(){
  try{
    let raw=localStorage.getItem('doumao_design');
    if(!raw){showToast('没有已保存的设计');return}
    let data=JSON.parse(raw);
    if(!data.grid||!data.w||!data.h)return;
    state.gridW=data.w;state.gridH=data.h;
    state.grid=data.grid.map(r=>r.map(c=>c?{...c}:null));
    state.history=[];state.historyIdx=-1;
    updateCanvasSize();saveSnapshot();renderAll();updateStatus();
    showToast(`📂 已加载 (${data.w}×${data.h})`);
  }catch(e){showToast('加载失败')}
}

// ============ KEYBOARD ============
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  let ctrl=e.ctrlKey||e.metaKey;
  if(ctrl&&e.key==='z'){e.preventDefault();undo();return}
  if(ctrl&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redo();return}
  switch(e.key.toLowerCase()){
    case'b':setTool('brush');break;case'e':setTool('eraser');break;case'g':setTool('fill');break;case'i':setTool('picker');break;case'm':setTool('move');break;
    case'h':state.mirrorH=!state.mirrorH;document.getElementById('btnMirrorH').classList.toggle('active',state.mirrorH);break;
    case'j':state.mirrorV=!state.mirrorV;document.getElementById('btnMirrorV').classList.toggle('active',state.mirrorV);break;
    case'\\':state.showGrid=!state.showGrid;document.getElementById('btnGrid').classList.toggle('active',state.showGrid);renderGridOverlay();break;
  }
  if(ctrl&&e.key==='s'){e.preventDefault();saveDesign();}
  if(ctrl&&e.key==='o'){e.preventDefault();loadDesign();}
});

// ============ BIND EVENTS ============
function bindEvents(){
  let ct=document.getElementById('canvasContainer');
  ct.addEventListener('pointerdown',onPointerDown);
  ct.addEventListener('pointermove',onPointerMove);
  ct.addEventListener('pointerup',onPointerUp);
  ct.addEventListener('pointerleave',onPointerUp);
  ct.addEventListener('contextmenu',e=>e.preventDefault());
  ct.addEventListener('wheel',onWheel,{passive:false});
  // Touch
  ct.addEventListener('touchstart',function(e){if(e.touches.length===1){let t=e.touches[0];onPointerDown({button:0,clientX:t.clientX,clientY:t.clientY});e.preventDefault()}},{passive:false});
  ct.addEventListener('touchmove',function(e){if(e.touches.length===1){let t=e.touches[0];onPointerMove({clientX:t.clientX,clientY:t.clientY});e.preventDefault()}},{passive:false});
  ct.addEventListener('touchend',onPointerUp);
}

// ============ STATUS ============
function updateStatus(){
  let placed=0,colors=new Set();
  for(let r=0;r<state.gridH;r++)for(let c=0;c<state.gridW;c++){let cell=state.grid[r][c];if(cell){placed++;colors.add(cell.hex)}}
  document.getElementById('statSize').textContent=`${state.gridW}×${state.gridH}`;
  document.getElementById('statPlaced').textContent=placed;
  document.getElementById('statColors').textContent=colors.size;
  document.getElementById('statZoom').textContent=Math.round(state.zoom*100)+'%';
  updateColorGrid();
}

// ============ TOAST ============
let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

// ============ RESIZE ============
window.addEventListener('resize',positionCanvases);

// ============ START ============
init();
setTool('brush');
document.getElementById('btnGrid').classList.add('active');
</script>
