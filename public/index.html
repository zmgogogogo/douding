<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0058BC">
<meta name="description" content="拼豆图纸设计工具，在线绘制像素风格拼豆图案">
<meta name="keywords" content="拼豆,拼豆图纸,像素画,拼豆设计">
<title>豆猫 - 在线拼豆图纸工具</title>
<style>
/* ===== CSS 变量 ===== */
:root{
  --primary:#0058BC;--primary-rgb:0,88,188;--primary-light:#e8f0fa;--primary-dark:#004a9e;
  --bg:#f3f4f6;--surface:#fff;--surface2:#f8fafc;--surface3:#f1f5f9;
  --border:#e5e7eb;--text:#1e293b;--text2:#64748b;--text3:#94a3b8;
  --danger:#ef4444;--danger-light:#fef2f2;--success:#10b981;--success-light:#ecfdf5;
  --warning:#f59e0b;--warning-light:#fffbeb;
  --shadow:0 4px 24px rgba(0,0,0,.08);--shadow-lg:0 12px 48px rgba(0,0,0,.12);
  --radius:12px;--radius-sm:8px;--radius-full:999px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;
  --nav-h:48px;--bottom-h:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
button,input,textarea,select{font-family:inherit;outline:none}
button{border:none;background:none;cursor:pointer;color:inherit}
a{color:inherit;text-decoration:none}
input,textarea{font-size:14px;color:var(--text)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== 应用外壳 ===== */
#app{display:flex;flex-direction:column;height:100%}
.page{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.page.active{display:flex}

/* ===== 顶栏 ===== */
.topbar{display:flex;align-items:center;gap:8px;height:var(--nav-h);padding:0 12px;background:var(--surface);border-bottom:1px solid var(--border);z-index:100;flex-shrink:0}
.topbar .logo{font-size:20px;cursor:pointer}
.topbar .brand{font-size:15px;font-weight:700;color:var(--primary);cursor:pointer}
.topbar .spacer{flex:1}
.topbar .nav-link{font-size:12px;font-weight:600;color:var(--text2);padding:4px 8px;border-radius:6px;transition:all .12s}
.topbar .nav-link:hover,.topbar .nav-link.active{color:var(--primary);background:var(--primary-light)}

/* ===== 按钮 ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;height:34px;padding:0 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:all .12s;white-space:nowrap;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-danger{color:var(--danger);background:var(--danger-light);border-color:transparent}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-sm{height:28px;padding:0 10px;font-size:11px;border-radius:6px}
.btn-lg{height:42px;padding:0 20px;font-size:15px;border-radius:var(--radius)}
.btn-icon{width:34px;height:34px;padding:0;font-size:16px;border-color:transparent}
.btn-icon.active{background:var(--primary-light);color:var(--primary)}

/* ===== 登录页 ===== */
.auth-page{display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#e8f0fa 0%,#f3f4f6 50%,#e8f0fa 100%)}
.auth-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:32px 28px;width:100%;max-width:380px}
.auth-card h2{font-size:22px;font-weight:800;margin-bottom:4px;text-align:center}
.auth-card .subtitle{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group textarea{width:100%;height:40px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;font-size:14px;transition:border-color .12s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(var(--primary-rgb),.1)}
.auth-card .btn-primary{width:100%;margin-top:8px}
.auth-card .switch{text-align:center;margin-top:16px;font-size:12px;color:var(--text2)}
.auth-card .switch a{color:var(--primary);font-weight:600;cursor:pointer}

/* ===== 发现页 ===== */
.home-page{overflow-y:auto;padding:16px 20px}
.home-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface2);border-radius:var(--radius-full);padding:3px;width:fit-content}
.home-tab{padding:6px 16px;border-radius:var(--radius-full);font-size:12px;font-weight:600;color:var(--text2);transition:all .12s;cursor:pointer}
.home-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.design-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.design-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:all .15s;cursor:pointer}
.design-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.design-card .thumb{width:100%;aspect-ratio:1;background:var(--surface3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.design-card .thumb canvas{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
.design-card .info{padding:8px 10px}
.design-card .title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.design-card .meta{font-size:10px;color:var(--text3);margin-top:2px;display:flex;gap:8px}

/* ===== 仓库页 ===== */
.warehouse-page{display:flex;overflow:hidden;flex:1}
.warehouse-sidebar{width:200px;min-width:200px;background:var(--surface);border-right:1px solid var(--border);padding:12px;overflow-y:auto}
.warehouse-sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px}
.folder-list{list-style:none;display:flex;flex-direction:column;gap:2px}
.folder-item{padding:8px 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .12s}
.folder-item:hover{background:var(--surface2)}
.folder-item.active{background:var(--primary-light);color:var(--primary)}
.folder-item .count{font-size:10px;color:var(--text3);margin-left:auto}
.warehouse-content{flex:1;overflow-y:auto;padding:16px}
.warehouse-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.warehouse-header h2{font-size:18px;font-weight:700}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;margin-bottom:16px}

/* ===== 详情页 ===== */
.detail-page{overflow-y:auto;padding:16px 20px;max-width:900px;margin:0 auto;width:100%}
.detail-header{display:flex;gap:16px;margin-bottom:20px}
.detail-preview{width:160px;height:160px;background:var(--surface3);border-radius:var(--radius);overflow:hidden;flex-shrink:0}
.detail-preview canvas{width:100%;height:100%;image-rendering:pixelated}
.detail-info{flex:1;min-width:0}
.detail-info h1{font-size:20px;font-weight:700;margin-bottom:4px}
.detail-info .author{font-size:12px;color:var(--text2);margin-bottom:8px}
.detail-info .author span{color:var(--primary);font-weight:600;cursor:pointer}
.detail-info .desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.detail-info .stats{display:flex;gap:16px;font-size:12px;color:var(--text3)}
.detail-info .actions{display:flex;gap:8px;margin-top:12px}
.color-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.color-chip{display:flex;align-items:center;gap:4px;background:var(--surface2);border-radius:var(--radius-full);padding:4px 10px 4px 4px;font-size:11px;color:var(--text2)}
.color-chip .dot{width:18px;height:18px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}

/* ===== 个人页 ===== */
.profile-page{overflow-y:auto;padding:16px 20px;max-width:600px;margin:0 auto;width:100%}
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--primary);overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-info h2{font-size:20px;font-weight:700}
.profile-info .handle{font-size:13px;color:var(--text3)}
.profile-stats{display:flex;gap:24px;margin-bottom:20px}
.profile-stat{text-align:center}
.profile-stat .num{font-size:20px;font-weight:700}
.profile-stat .label{font-size:11px;color:var(--text3)}

/* ===== 编辑器页 ===== */
.editor-page{flex-direction:row}
.editor-toolbar{display:flex;flex-direction:column;gap:4px;padding:8px 4px;background:var(--surface);border-right:1px solid var(--border);width:44px;min-width:44px;overflow-y:auto}
.editor-tool{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:16px;color:var(--text2);transition:all .12s;position:relative}
.editor-tool:hover{background:var(--surface2);color:var(--text)}
.editor-tool.active{background:var(--primary-light);color:var(--primary)}
.editor-canvas-wrap{flex:1;position:relative;overflow:hidden;background:#e2e8f0;background-image:radial-gradient(circle,#cbd5e1 1px,transparent 1px);background-size:20px 20px}
.editor-canvas-wrap canvas{position:absolute;top:0;left:0;image-rendering:pixelated}
.editor-canvas-wrap canvas.grid-overlay{pointer-events:none}
.editor-canvas-wrap canvas.ref-overlay{pointer-events:none}
.editor-panel{width:220px;min-width:220px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:8px}

/* ===== 搜索页 ===== */
.search-page{overflow-y:auto;padding:16px 20px}
.search-input-wrap{position:relative;max-width:400px;margin:0 auto 20px}
.search-input-wrap input{width:100%;height:42px;border:1px solid var(--border);border-radius:var(--radius-full);padding:0 44px 0 18px;font-size:14px}
.search-input-wrap .search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text3)}

/* ===== 提示条 ===== */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 20px;border-radius:var(--radius-full);font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* ===== 模态框 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500;display:flex;align-items:center;justify-content:center}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:24px;max-width:420px;width:90%;max-height:80vh;overflow-y:auto}
.modal-box h3{font-size:18px;font-weight:700;margin-bottom:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ===== 移动端适配 ===== */
@media(max-width:768px){
  .topbar{gap:4px;padding:0 6px}.topbar .brand{font-size:13px}.topbar .nav-link{font-size:10px;padding:3px 6px}
  .btn{font-size:11px;height:28px;padding:0 8px}.btn-sm{height:24px;font-size:10px}
  .design-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .warehouse-sidebar{display:none}
  .editor-panel{position:fixed;right:0;top:var(--nav-h);bottom:var(--bottom-h);width:240px;transform:translateX(100%);transition:transform .25s;z-index:50;box-shadow:var(--shadow-lg)}
  .editor-panel.open{transform:translateX(0)}
  .detail-header{flex-direction:column;align-items:center}
}
</style>
</head>
<body>

<!-- ===== 应用根节点 ===== -->
<div id="app">
  <!-- 顶栏：Logo、导航、用户按钮 -->
  <div class="topbar" id="topbar">
    <span class="logo" onclick="navigate('home')">🧩</span>
    <span class="brand" onclick="navigate('home')">豆猫</span>
    <span class="spacer"></span>
    <a class="nav-link" href="#home" data-nav="home">🏠 发现</a>
    <a class="nav-link" href="#warehouse" data-nav="warehouse" id="navWarehouse" style="display:none">📦 我的</a>
    <span class="spacer"></span>
    <button class="btn btn-sm btn-primary" id="btnCreate" onclick="navigate('editor')">+ 新建图纸</button>
    <button class="btn btn-sm" id="btnLogin" onclick="navigate('login')">登录</button>
    <button class="btn btn-ghost btn-sm" id="btnProfile" style="display:none" onclick="navigate('profile')">👤</button>
  </div>

  <!-- 页面：发现广场 -->
  <div class="page active" id="page-home">
    <div class="home-page">
      <div class="home-tabs" id="homeTabs">
        <button class="home-tab active" data-sort="latest">🆕 最新</button>
        <button class="home-tab" data-sort="popular">🔥 热门</button>
        <button class="home-tab" data-sort="views">👁 最多浏览</button>
      </div>
      <div class="design-grid" id="exploreGrid"></div>
      <div style="text-align:center;padding:20px" id="exploreLoading">加载中...</div>
    </div>
  </div>

  <!-- 页面：登录/注册 -->
  <div class="page auth-page" id="page-login">
    <div class="auth-card" id="authCard"></div>
  </div>

  <!-- 页面：编辑器 -->
  <div class="page editor-page" id="page-editor">
    <div class="editor-toolbar" id="editorToolbar">
      <button class="editor-tool active" data-tool="brush">✏️</button>
      <button class="editor-tool" data-tool="eraser">🧹</button>
      <button class="editor-tool" data-tool="fill">🪣</button>
      <button class="editor-tool" data-tool="picker">💉</button>
      <button class="editor-tool" data-tool="move">✋</button>
      <div style="flex:1"></div>
      <button class="editor-tool" onclick="toggleEditorPanel()">🎨</button>
    </div>
    <!-- 三层画布：参考图 → 珠子 → 网格线 -->
    <div class="editor-canvas-wrap" id="editorCanvasWrap">
      <canvas id="refCanvas"></canvas>
      <canvas id="mainCanvas" class="grid-overlay"></canvas>
      <canvas id="gridCanvas" class="grid-overlay"></canvas>
    </div>
    <!-- 右侧面板：调色板 + 操作按钮 -->
    <div class="editor-panel" id="editorPanel">
      <div style="margin-bottom:8px">
        <select id="editorBrand" style="width:100%;height:32px;border:1px solid var(--border);border-radius:6px;font-size:12px;margin-bottom:4px"></select>
        <div id="editorSeriesTabs" style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px"></div>
        <div id="editorColorGrid" style="display:flex;flex-wrap:wrap;gap:3px"></div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:8px">
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">
          <button class="btn btn-sm" id="editorBtnUndo">↩ 撤销</button>
          <button class="btn btn-sm" id="editorBtnRedo">↪ 重做</button>
          <button class="btn btn-sm" id="editorBtnMirrorH">↔ 镜像</button>
          <button class="btn btn-sm" id="editorBtnMirrorV">↕ 镜像</button>
          <button class="btn btn-sm" id="editorBtnGrid">📐 网格</button>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:8px">
          <button class="btn btn-sm" id="editorBtnImport">📷 导入</button>
          <button class="btn btn-sm" id="editorBtnExport">📥 导出</button>
          <button class="btn btn-sm btn-primary" id="editorBtnSave">💾 保存</button>
        </div>
        <div style="font-size:11px;color:var(--text3)">
          <span>尺寸: <strong id="editorStatSize">58×58</strong></span>
          <span style="margin-left:8px">珠子: <strong id="editorStatBeads">0</strong></span>
        </div>
        <input type="file" id="editorImportFile" accept="image/*" style="display:none">
      </div>
    </div>
  </div>

  <!-- 页面：我的仓库 -->
  <div class="page warehouse-page" id="page-warehouse">
    <div class="warehouse-sidebar" id="warehouseSidebar">
      <h3>📁 文件夹</h3>
      <ul class="folder-list" id="folderList"><li class="folder-item active" data-folder="">📋 全部</li></ul>
      <button class="btn btn-sm btn-ghost" id="btnNewFolder" style="margin-top:8px;width:100%">+ 新建文件夹</button>
    </div>
    <div class="warehouse-content" id="warehouseContent">
      <div class="warehouse-header"><h2>我的图纸</h2></div>
      <div class="design-grid" id="warehouseGrid"></div>
      <div class="empty-state hidden" id="warehouseEmpty">
        <div class="icon">📭</div><p>还没有图纸，去创作一个吧！</p>
        <button class="btn btn-primary" onclick="navigate('editor')">开始创作</button>
      </div>
    </div>
  </div>

  <!-- 页面：设计详情 -->
  <div class="page" id="page-detail"><div class="detail-page" id="detailContent"></div></div>

  <!-- 页面：个人主页 -->
  <div class="page" id="page-profile"><div class="profile-page" id="profileContent"></div></div>

  <!-- 页面：搜索 -->
  <div class="page" id="page-search">
    <div class="search-page">
      <div class="search-input-wrap">
        <input type="text" id="searchInput" placeholder="搜索公开图纸...">
        <span class="search-icon">🔍</span>
      </div>
      <div class="design-grid" id="searchGrid"></div>
      <div class="empty-state hidden" id="searchEmpty"><div class="icon">🔍</div><p>输入关键词搜索图纸</p></div>
    </div>
  </div>
</div>

<!-- 提示条 -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  豆猫 SPA 前端 — API 客户端、认证、路由、全部页面
//  使用原生 JavaScript，基于 hash 的单页路由
// ============================================================

// ============================================
//  1. API 客户端：封装所有后端请求
// ============================================
const API = {
  // 通用请求方法：自动附加 JWT 认证头
  async request(method, url, body, auth = true) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (auth && AUTH.token) opts.headers['Authorization'] = 'Bearer ' + AUTH.token;
    if (body && method !== 'GET') opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    const data = await res.json();
    if (!res.ok && data.code !== 200) throw new Error(data.message || '请求失败');
    return data;
  },
  get(url, auth = true) { return this.request('GET', url, null, auth); },
  post(url, body, auth = true) { return this.request('POST', url, body, auth); },
  put(url, body, auth = true) { return this.request('PUT', url, body, auth); },
  del(url, auth = true) { return this.request('DELETE', url, null, auth); },
};

// ============================================
//  2. 用户认证：JWT token 管理 + localStorage 持久化
// ============================================
const AUTH = {
  token: localStorage.getItem('doumao_token'),       // 从本地存储恢复登录态
  user: JSON.parse(localStorage.getItem('doumao_user') || 'null'),

  // 登录成功：保存 token 和用户信息
  set(token, user) {
    this.token = token; this.user = user;
    localStorage.setItem('doumao_token', token);
    localStorage.setItem('doumao_user', JSON.stringify(user));
    updateTopbar();
  },

  // 退出登录：清除本地数据
  logout() {
    this.token = null; this.user = null;
    localStorage.removeItem('doumao_token');
    localStorage.removeItem('doumao_user');
    updateTopbar();
    navigate('home');
  },

  get isLoggedIn() { return !!this.token && !!this.user; }
};

// 根据登录状态更新顶栏按钮的显示/隐藏
function updateTopbar() {
  const loggedIn = AUTH.isLoggedIn;
  document.getElementById('btnLogin').style.display = loggedIn ? 'none' : '';
  document.getElementById('btnProfile').style.display = loggedIn ? '' : 'none';
  document.getElementById('navWarehouse').style.display = loggedIn ? '' : 'none';
  document.getElementById('btnProfile').textContent = loggedIn
    ? (AUTH.user.nickname || AUTH.user.username).charAt(0).toUpperCase() : '👤';
}

// ============================================
//  3. 路由系统：基于 URL hash 的单页路由
// ============================================
let currentPage = 'home';       // 当前页面名称
let pageParams = {};            // 页面参数（如设计 ID）

// 导航到指定页面
function navigate(page, params = {}) {
  currentPage = page;
  pageParams = params;
  window.location.hash = page + (params.id ? '/' + params.id : '');
  showPage(page);
}

// 切换页面显示，并触发对应渲染函数
function showPage(page) {
  // 隐藏所有页面，显示目标页面
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + page);
  if (el) el.classList.add('active');

  // 更新导航高亮
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  const nav = document.querySelector(`[data-nav="${page}"]`);
  if (nav) nav.classList.add('active');

  // 根据页面类型调用不同的渲染函数

// 渲染页面上所有设计卡片的缩略图（从内嵌的 grid data 生成 canvas 预览）
function renderThumbnails() {
  document.querySelectorAll('.design-thumb-canvas').forEach(canvas => {
    if (canvas.dataset.rendered) return;  // 避免重复渲染
    canvas.dataset.rendered = '1';
    try {
      const grid = JSON.parse(canvas.dataset.grid);
      const size = Math.min(80, grid.length || 30);
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const img = ctx.createImageData(size, size);
      for (let r = 0; r < size && r < grid.length; r++) {
        const row = grid[r] || [];
        for (let c = 0; c < size && c < row.length; c++) {
          const cell = row[c];
          const idx = (r * size + c) * 4;
          if (cell && cell.hex) {
            const h = cell.hex.replace('#', '');
            img.data[idx] = parseInt(h.substring(0,2), 16);
            img.data[idx+1] = parseInt(h.substring(2,4), 16);
            img.data[idx+2] = parseInt(h.substring(4,6), 16);
            img.data[idx+3] = 255;
          }
        }
      }
      ctx.putImageData(img, 0, 0);
    } catch(e) { /* 忽略缩略图渲染错误 */ }
  });
}

      const size = 160;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const grid = Array.isArray(d.gridData) ? d.gridData : [];
      const cellW = size / Math.max(d.gridWidth, d.gridHeight);
      for (let r = 0; r < Math.min(grid.length, d.gridHeight); r++) {
        const row = grid[r] || [];
        for (let c = 0; c < Math.min(row.length, d.gridWidth); c++) {

  }
}

// 统计 gridData 中各颜色出现次数（用于详情页颜色列表）
function getUniqueColors(gridData) {
  const map = {};
  const grid = Array.isArray(gridData) ? gridData : [];
  for (const row of grid) {
    if (!Array.isArray(row)) continue;
    for (const cell of row) {
      if (cell && cell.hex) {
        if (!map[cell.hex]) map[cell.hex] = { hex: cell.hex, name: cell.name || cell.hex, count: 0 };
        map[cell.hex].count++;
      }
    }
  }
  return Object.values(map).sort((a, b) => b.count - a.count);
}

const ES = {
  gridW: 58, gridH: 58,           // 画板尺寸（宽×高，单位：珠子数）
  grid: [],                        // 二维数组 grid[row][col] = {name,hex,brand,series}|null

  brushSize: 1, eraserSize: 1,    // 画笔和橡皮的大小

  mirrorH: false, mirrorV: false,  // 水平/垂直镜像绘制
  showGrid: true,                  // 是否显示网格线
  history: [], historyIdx: -1,     // 撤销历史（存储画板快照）
  maxHistory: 200,                 // 最多保留 200 步历史
  isDrawing: false, lastCell: null, // 绘制状态跟踪
  refPixels: null, refW: 0, refH: 0, refOpacity: 0.3,  // 参考图数据
  editId: null,                    // 编辑已有设计时的 ID
  beadData: [],                    // 从 API 加载的珠子颜色列表
};

// 画布引用
let mCanvas, mCtx;   // 主画布：渲染珠子网格
let gCanvas, gCtx;   // 网格画布：渲染网格线
let rCanvas, rCtx;   // 参考图画布：渲染导入的参考图

// ---- 编辑器初始化 ----
async function initEditor() {
  const editId = pageParams.editId;
  ES.editId = editId;

  // 从 API 加载珠子颜色数据
  try {
    const res = await API.get('/api/beads/colors', false);
    ES.beadData = res.data || [];
    ES.curColor = ES.beadData.find(c => c.hex === '#1A1A1A') || ES.beadData[0]
      || { name: 'Black', hex: '#1A1A1A', brand: 'Hama' };
  } catch (e) {
    ES.beadData = [];
    ES.curColor = { name: 'Black', hex: '#1A1A1A', brand: 'Hama' };
  }

  // 如果是编辑已有设计，加载其数据
  if (editId) {
    try {
      const res = await API.get('/api/designs/' + editId);
      const d = res.data;
      ES.gridW = d.gridWidth; ES.gridH = d.gridHeight;
      ES.grid = normalizeGrid(d.gridData, d.gridWidth, d.gridHeight);
    } catch (e) {
      ES.grid = createEmptyGrid(ES.gridW, ES.gridH);
    }
  } else {
    ES.grid = createEmptyGrid(ES.gridW, ES.gridH);
  }

  // 初始化状态
  ES.history = []; ES.historyIdx = -1;
  saveEditorSnapshot();        // 保存初始状态到历史
  setupEditorCanvas();         // 设置三层画布
  buildEditorPalette();        // 构建调色板 UI
  bindEditorEvents();          // 绑定画布交互事件
  renderEditorAll();           // 首次渲染
  updateEditorStatus();        // 更新状态栏
}

// 创建空画板
function createEmptyGrid(w, h) {
  return Array.from({ length: h }, () => Array(w).fill(null));
}

// 规范化 grid 数据：补齐/裁剪到目标尺寸
function normalizeGrid(gridData, w, h) {
  let grid = (Array.isArray(gridData) ? gridData : []).map(row =>
    (Array.isArray(row) ? row : []).map(cell => cell ? { ...cell } : null)
  );
  while (grid.length < h) grid.push(Array(w).fill(null));
  grid = grid.slice(0, h).map(r => { while (r.length < w) r.push(null); return r.slice(0, w); });
  return grid;
}

// ---- 画布设置 ----
function setupEditorCanvas() {
  mCanvas = document.getElementById('mainCanvas');
  mCtx = mCanvas.getContext('2d', { willReadFrequently: true });
  gCanvas = document.getElementById('gridCanvas');
  gCtx = gCanvas.getContext('2d');
  rCanvas = document.getElementById('refCanvas');
  rCtx = rCanvas.getContext('2d');
  updateEditorCanvasSize();
}

// 更新画布尺寸：内部分辨率 = grid × devicePixelRatio，CSS 尺寸 = grid × zoom
function updateEditorCanvasSize() {
  const dpr = window.devicePixelRatio || 1;
  const iw = ES.gridW * dpr, ih = ES.gridH * dpr;
  [mCanvas, gCanvas, rCanvas].forEach(c => { c.width = iw; c.height = ih; });
  mCtx.setTransform(dpr, 0, 0, dpr, 0, 0); mCtx.imageSmoothingEnabled = false;
  gCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  rCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  positionEditorCanvases();
}

// 将画布定位到容器中心，并应用平移偏移
function positionEditorCanvases() {
  const ct = document.getElementById('editorCanvasWrap');
  const cx = ct.clientWidth / 2 + ES.panX - ES.gridW * ES.zoom / 2;
  const cy = ct.clientHeight / 2 + ES.panY - ES.gridH * ES.zoom / 2;
  const w = ES.gridW * ES.zoom, h = ES.gridH * ES.zoom;
  [mCanvas, gCanvas, rCanvas].forEach(c => {
    c.style.left = cx + 'px'; c.style.top = cy + 'px';
    c.style.width = w + 'px'; c.style.height = h + 'px';
  });
}

function renderEditorAll() {
  renderMainGrid();       // 珠子网格
  renderGridOverlay();    // 网格线
  renderRefOverlay();     // 参考图
}

// 渲染珠子网格：每个珠子 = 1 像素，使用 ImageData 高效写入
function renderMainGrid() {
  const dpr = window.devicePixelRatio || 1;
  mCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  mCtx.clearRect(0, 0, ES.gridW, ES.gridH);
  const imgData = mCtx.createImageData(ES.gridW, ES.gridH);
  for (let r = 0; r < ES.gridH; r++) {
    for (let c = 0; c < ES.gridW; c++) {
      const cell = ES.grid[r][c];
      const idx = (r * ES.gridW + c) * 4;
      if (cell && cell.hex) {
        const h = cell.hex.replace('#', '');
        imgData.data[idx] = parseInt(h.substring(0, 2), 16);
        imgData.data[idx + 1] = parseInt(h.substring(2, 4), 16);
        imgData.data[idx + 2] = parseInt(h.substring(4, 6), 16);
        imgData.data[idx + 3] = 255;
      }
    }
  }
  mCtx.putImageData(imgData, 0, 0);
}

// 渲染网格线叠加层
function renderGridOverlay() {
  const dpr = window.devicePixelRatio || 1;
  gCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gCtx.clearRect(0, 0, ES.gridW, ES.gridH);
  if (!ES.showGrid) return;
  gCtx.strokeStyle = 'rgba(0,0,0,0.25)';
  gCtx.lineWidth = 0.5;
  for (let r = 0; r <= ES.gridH; r++) {
    gCtx.beginPath(); gCtx.moveTo(0, r); gCtx.lineTo(ES.gridW, r); gCtx.stroke();
  }
  for (let c = 0; c <= ES.gridW; c++) {
    gCtx.beginPath(); gCtx.moveTo(c, 0); gCtx.lineTo(c, ES.gridH); gCtx.stroke();
  }
}

// 渲染参考图叠加层（图片导入后显示）
function renderRefOverlay() {
  const dpr = window.devicePixelRatio || 1;
  rCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  rCtx.clearRect(0, 0, ES.gridW, ES.gridH);
  if (!ES.refPixels) return;
  const refImg = rCtx.createImageData(ES.gridW, ES.gridH);
  for (let r = 0; r < Math.min(ES.gridH, ES.refH); r++) {
    for (let c = 0; c < Math.min(ES.gridW, ES.refW); c++) {
      const px = ES.refPixels[r] ? ES.refPixels[r][c] : null;
      if (!px) continue;
      const idx = (r * ES.gridW + c) * 4;
      refImg.data[idx] = px.r; refImg.data[idx + 1] = px.g; refImg.data[idx + 2] = px.b;
      refImg.data[idx + 3] = Math.round(ES.refOpacity * 255);
    }
  }
  rCtx.putImageData(refImg, 0, 0);
}

// 更新状态栏：画板尺寸 + 珠子数量
function updateEditorStatus() {
  let placed = 0;
  for (let r = 0; r < ES.gridH; r++) {
    for (let c = 0; c < ES.gridW; c++) {
      if (ES.grid[r][c] && ES.grid[r][c].hex) placed++;
    }
  }
  document.getElementById('editorStatSize').textContent = `${ES.gridW}×${ES.gridH}`;
  document.getElementById('editorStatBeads').textContent = placed;
}

// ---- 撤销/重做系统 ----
function saveEditorSnapshot() {
  const snap = ES.grid.map(r => r.map(c => c ? { ...c } : null));
  ES.history = ES.history.slice(0, ES.historyIdx + 1);
  ES.history.push({ grid: snap, w: ES.gridW, h: ES.gridH });
  if (ES.history.length > ES.maxHistory) ES.history.shift();
  ES.historyIdx = ES.history.length - 1;
}

function editorUndo() {
  if (ES.historyIdx <= 0) return;
  ES.historyIdx--;
  restoreEditorSnapshot(ES.history[ES.historyIdx]);
}

function editorRedo() {
  if (ES.historyIdx >= ES.history.length - 1) return;
  ES.historyIdx++;
  restoreEditorSnapshot(ES.history[ES.historyIdx]);
}

function restoreEditorSnapshot(snap) {
  ES.gridW = snap.w; ES.gridH = snap.h;
  ES.grid = snap.grid.map(r => r.map(c => c ? { ...c } : null));
  updateEditorCanvasSize();
  renderEditorAll();
  updateEditorStatus();
}

// ---- 画布像素坐标 → 珠子坐标 ----
function getEditorCell(ex, ey) {
  const rect = mCanvas.getBoundingClientRect();
  const col = Math.floor((ex - rect.left) / ES.zoom);
  const row = Math.floor((ey - rect.top) / ES.zoom);
  if (col < 0 || col >= ES.gridW || row < 0 || row >= ES.gridH) return null;
  return { row, col };
}

// 设置单个珠子
function setEditorCell(r, c, color) {
  if (r < 0 || r >= ES.gridH || c < 0 || c >= ES.gridW) return;
  const old = ES.grid[r][c];
  if (old && color && old.hex === color.hex) return;  // 颜色相同，跳过
  if (!old && !color) return;                          // 都是空，跳过
  ES.grid[r][c] = color ? { ...color } : null;
}

// 在指定位置绘制（根据当前工具和参数）
function editorDrawAt(row, col) {
  let changed = false;

  if (ES.tool === 'brush' && ES.curColor) {
    // 画笔：在 brushSize × brushSize 范围内绘制，支持镜像
    const bs = ES.brushSize;
    for (let dr = -bs + 1; dr < bs; dr++) {
      for (let dc = -bs + 1; dc < bs; dc++) {
        const r = row + dr, c = col + dc;
        if (r < 0 || r >= ES.gridH || c < 0 || c >= ES.gridW) continue;
        const old = ES.grid[r] ? ES.grid[r][c] : null;
        if (old && old.hex === ES.curColor.hex) continue;
        setEditorCell(r, c, ES.curColor); changed = true;
        // 应用镜像
        if (ES.mirrorH) { const mc = ES.gridW - 1 - c; if (mc >= 0 && mc < ES.gridW) setEditorCell(r, mc, ES.curColor); }
        if (ES.mirrorV) { const mr = ES.gridH - 1 - r; if (mr >= 0 && mr < ES.gridH) setEditorCell(mr, c, ES.curColor); }
        if (ES.mirrorH && ES.mirrorV) { setEditorCell(ES.gridH - 1 - r, ES.gridW - 1 - c, ES.curColor); }
      }
    }
  } else if (ES.tool === 'eraser') {
    // 橡皮：在 eraserSize × eraserSize 范围内清除
    const es = ES.eraserSize;
    for (let dr = -es + 1; dr < es; dr++) {
      for (let dc = -es + 1; dc < es; dc++) {
        const r = row + dr, c = col + dc;
        if (r < 0 || r >= ES.gridH || c < 0 || c >= ES.gridW) continue;
        if (!ES.grid[r] || !ES.grid[r][c]) continue;
        setEditorCell(r, c, null); changed = true;
      }
    }
  } else if (ES.tool === 'fill') {
    // 填充：泛洪算法
    changed = editorFloodFill(row, col);
  } else if (ES.tool === 'picker') {
    // 吸色：获取该位置颜色并切换到画笔
    const cell = ES.grid[row] ? ES.grid[row][col] : null;
    if (cell) { ES.curColor = cell; setEditorTool('brush'); buildEditorPalette(); }
    return false;
  }
  return changed;
}

// 泛洪填充：从起点开始填充所有相连的同色区域
function editorFloodFill(sr, sc) {
  const target = ES.grid[sr] ? ES.grid[sr][sc] : null;
  const tHex = target ? target.hex : null;
  const fill = ES.curColor;
  if (!fill || tHex === fill.hex) return false;

  const stack = [[sr, sc]], visited = new Set();
  let changed = false;
  while (stack.length) {
    const [r, c] = stack.pop();
    const k = `${r},${c}`;
    if (visited.has(k)) continue;
    if (r < 0 || r >= ES.gridH || c < 0 || c >= ES.gridW) continue;
    const cell = ES.grid[r] ? ES.grid[r][c] : null;
    const ch = cell ? cell.hex : null;
    if (ch !== tHex) continue;
    visited.add(k); setEditorCell(r, c, fill); changed = true;
    stack.push([r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]);
  }
  return changed;
}

// ---- 调色板 UI ----
function buildEditorPalette() {
  // 品牌下拉框
  const brands = [...new Set(ES.beadData.map(c => c.brand))];
  const bs = document.getElementById('editorBrand');
  bs.innerHTML = brands.map(b => `<option value="${b}">${b}</option>`).join('');
  bs.value = ES.curColor ? (ES.curColor.brand || brands[0]) : brands[0];
  bs.onchange = buildEditorPalette;

  // 系列标签
  const brand = bs.value;
  const brandColors = ES.beadData.filter(c => c.brand === brand);
  const series = [...new Set(brandColors.map(c => c.series))];

  const st = document.getElementById('editorSeriesTabs');
  st.innerHTML = series.map((s, i) =>
    `<button class="btn btn-sm ${i === 0 ? '' : 'btn-ghost'}" data-series="${esc(s)}"
      style="font-size:10px;height:24px;padding:0 8px">${esc(s)}</button>`).join('');

  st.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => {
      st.querySelectorAll('button').forEach(b => {
        b.className = 'btn btn-sm btn-ghost';
        b.style.cssText = 'font-size:10px;height:24px;padding:0 8px';
      });
      btn.className = 'btn btn-sm';
      btn.style.cssText = 'font-size:10px;height:24px;padding:0 8px;background:var(--primary-light);color:var(--primary);border-color:var(--primary)';
      renderEditorColorGrid(btn.dataset.series);
    };
  });

  if (series.length > 0) renderEditorColorGrid(series[0]);
}

// 渲染选中系列的颜色网格
function renderEditorColorGrid(seriesName) {
  const brand = document.getElementById('editorBrand').value;
  const colors = ES.beadData.filter(c => c.brand === brand && c.series === seriesName);
  const grid = document.getElementById('editorColorGrid');

  grid.innerHTML = colors.map(c => `
    <div style="width:26px;height:26px;border-radius:50%;background:${c.hex};cursor:pointer;
      border:2px solid ${ES.curColor && ES.curColor.hex === c.hex ? 'var(--primary)' : 'transparent'};
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);transition:all .12s;flex-shrink:0"
      data-hex="${c.hex}" data-name="${esc(c.name)}" data-brand="${esc(c.brand)}" data-series="${esc(c.series)}"
      title="${esc(c.name)} ${c.hex}"
      onmouseover="this.style.transform='scale(1.2)';this.style.zIndex='2'"
      onmouseout="this.style.transform='';this.style.zIndex=''"
    ></div>`).join('');

  grid.querySelectorAll('div').forEach(dot => {
    dot.onclick = function() {
      ES.curColor = {
        name: this.dataset.name, hex: this.dataset.hex,
        brand: this.dataset.brand, series: this.dataset.series
      };
      if (ES.tool === 'eraser') setEditorTool('brush');
      buildEditorPalette();
    };
  });
}

// ---- 工具切换 ----
function setEditorTool(tool) {
  ES.tool = tool;
  document.querySelectorAll('#editorToolbar .editor-tool').forEach(b => {
    b.classList.toggle('active', b.dataset.tool === tool);
  });
}

document.querySelectorAll('#editorToolbar .editor-tool').forEach(b => {
  b.addEventListener('click', () => setEditorTool(b.dataset.tool));
});

function toggleEditorPanel() {
  document.getElementById('editorPanel').classList.toggle('open');
}

// ---- 编辑器按钮事件 ----
document.getElementById('editorBtnUndo').addEventListener('click', editorUndo);
document.getElementById('editorBtnRedo').addEventListener('click', editorRedo);
document.getElementById('editorBtnMirrorH').addEventListener('click', function() {
  ES.mirrorH = !ES.mirrorH;
  this.style.background = ES.mirrorH ? 'var(--primary-light)' : '';
});
document.getElementById('editorBtnMirrorV').addEventListener('click', function() {
  ES.mirrorV = !ES.mirrorV;
  this.style.background = ES.mirrorV ? 'var(--primary-light)' : '';
});
document.getElementById('editorBtnGrid').addEventListener('click', function() {
  ES.showGrid = !ES.showGrid;
  renderEditorAll();
});

// 导入图片按钮
document.getElementById('editorBtnImport').addEventListener('click', () => {
  document.getElementById('editorImportFile').click();
});
document.getElementById('editorImportFile').addEventListener('change', async function() {
  if (!this.files[0]) return;
  const form = new FormData();
  form.append('file', this.files[0]);
  form.append('targetWidth', ES.gridW);
  try {
    const res = await fetch('/api/image-to-grid', {
      method: 'POST', body: form,
      headers: AUTH.token ? { 'Authorization': 'Bearer ' + AUTH.token } : {}
    });
    const data = await res.json();
    if (data.code === 200) {
      // 将返回的网格数据转为参考图像素
      ES.refPixels = data.data.grid.map(row =>
        row.map(cell => cell ? {
          r: parseInt(cell.hex.substring(1, 3), 16),
          g: parseInt(cell.hex.substring(3, 5), 16),
          b: parseInt(cell.hex.substring(5, 7), 16)
        } : null)
      );
      ES.refW = data.data.gridWidth; ES.refH = data.data.gridHeight;
      renderEditorAll();
      toast(`参考图已生成 (${data.data.gridWidth}×${data.data.gridHeight})`);
    }
  } catch (e) { toast('图片处理失败'); }
  this.value = '';
});

// 导出 PNG 按钮
document.getElementById('editorBtnExport').addEventListener('click', () => {
  const scale = 4;  // 每个珠子 = 4×4 像素
  const ec = document.createElement('canvas');
  ec.width = ES.gridW * scale; ec.height = ES.gridH * scale;
  const ectx = ec.getContext('2d'); ectx.imageSmoothingEnabled = false;

  for (let r = 0; r < ES.gridH; r++) {
    for (let c = 0; c < ES.gridW; c++) {
      const cell = ES.grid[r] ? ES.grid[r][c] : null;
      const cx = c * scale + scale / 2, cy = r * scale + scale / 2, rad = scale * 0.45;
      ectx.beginPath(); ectx.arc(cx, cy, rad, 0, Math.PI * 2);
      ectx.fillStyle = cell ? cell.hex : '#f0f0f0'; ectx.fill();
      if (cell) { ectx.strokeStyle = 'rgba(0,0,0,.15)'; ectx.lineWidth = 0.5; ectx.stroke(); }
    }
  }

  const a = document.createElement('a');
  a.download = `拼豆_${ES.gridW}x${ES.gridH}.png`;
  a.href = ec.toDataURL(); a.click();
  toast('已导出 PNG');
});

// 保存设计按钮
document.getElementById('editorBtnSave').addEventListener('click', async () => {
  if (!AUTH.isLoggedIn) { navigate('login'); return toast('请先登录'); }

  const title = prompt('图纸名称：', ES.editId ? '更新图纸' : '我的拼豆设计');
  if (!title) return;

  // 序列化画板数据
  const gridData = ES.grid.map(row =>
    row.map(cell => cell ? {
      id: cell.id, name: cell.name, hex: cell.hex, brand: cell.brand, series: cell.series
    } : null)
  );

  const body = {
    title,
    gridWidth: ES.gridW, gridHeight: ES.gridH,
    gridData: JSON.stringify(gridData),
    isPublic: confirm('是否公开发布？'),
    brand: ES.curColor ? ES.curColor.brand : 'Hama',
  };

  try {
    if (ES.editId) {
      await API.put('/api/designs/' + ES.editId, body);
      toast('图纸已更新！');
    } else {
      const res = await API.post('/api/designs', body);
      ES.editId = res.data.id;
      toast('图纸已保存！');
    }
  } catch (e) { toast('保存失败: ' + e.message); }
});

// ---- 画布交互事件 ----
function bindEditorEvents() {
  const ct = document.getElementById('editorCanvasWrap');
  let dragPanStart = null;  // 平移工具的起始位置

  // 鼠标/触摸按下
  ct.onpointerdown = function(e) {
    // 右键：快速擦除
    if (e.button === 2) {
      e.preventDefault();
      const cell = getEditorCell(e.clientX, e.clientY);
      if (cell && ES.grid[cell.row] && ES.grid[cell.row][cell.col]) {
        setEditorCell(cell.row, cell.col, null);
        saveEditorSnapshot(); renderEditorAll();
      }
      return;
    }
    if (e.button !== 0) return;

    // 移动工具：记录起始平移位置
    if (ES.tool === 'move') {
      dragPanStart = { x: e.clientX - ES.panX, y: e.clientY - ES.panY };
      return;
    }

    const cell = getEditorCell(e.clientX, e.clientY);
    if (!cell) return;
    ES.isDrawing = true; ES.lastCell = cell;
    if (editorDrawAt(cell.row, cell.col)) {
      saveEditorSnapshot(); renderEditorAll(); updateEditorStatus();
    }
  };

  // 鼠标/触摸移动
  ct.onpointermove = function(e) {
    // 移动工具拖拽平移
    if (ES.tool === 'move' && dragPanStart) {
      ES.panX = e.clientX - dragPanStart.x;
      ES.panY = e.clientY - dragPanStart.y;
      positionEditorCanvases(); return;
    }
    if (!ES.isDrawing) return;

    const cell = getEditorCell(e.clientX, e.clientY);
    // 防止重复绘制同一格
    if (!cell || (ES.lastCell && ES.lastCell.row === cell.row && ES.lastCell.col === cell.col)) return;
    ES.lastCell = cell;
    if (editorDrawAt(cell.row, cell.col)) { saveEditorSnapshot(); renderEditorAll(); }
  };

  // 松开：结束绘制
  ct.onpointerup = function() {
    ES.isDrawing = false; ES.lastCell = null; dragPanStart = null;
    updateEditorStatus();
  };
  ct.onpointerleave = function() {
    ES.isDrawing = false; ES.lastCell = null; dragPanStart = null;
    updateEditorStatus();
  };

  // 禁用右键菜单
  ct.oncontextmenu = e => e.preventDefault();

  // 滚轮缩放（以鼠标位置为中心）
  ct.onwheel = function(e) {
    e.preventDefault();
    const rect = ct.getBoundingClientRect();
    const mx = e.clientX - rect.left - ct.clientWidth / 2;
    const my = e.clientY - rect.top - ct.clientHeight / 2;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newZ = Math.max(0.1, Math.min(30, ES.zoom * delta));
    // 调整平移偏移以保持鼠标下的点不动
    ES.panX -= mx * (newZ / ES.zoom - 1);
    ES.panY -= my * (newZ / ES.zoom - 1);
    ES.zoom = newZ;
    updateEditorCanvasSize();
    renderEditorAll();
  };

  // 触摸事件（移动端）
  ct.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      ct.onpointerdown({ button: 0, clientX: t.clientX, clientY: t.clientY, preventDefault: () => {} });
      e.preventDefault();
    }
  }, { passive: false });
  ct.addEventListener('touchmove', e => {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      ct.onpointermove({ clientX: t.clientX, clientY: t.clientY });
      e.preventDefault();
    }
  }, { passive: false });
  ct.addEventListener('touchend', ct.onpointerup);
}

// ---- 键盘快捷键（仅在编辑器页面生效）----
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (currentPage !== 'editor') return;
  const ctrl = e.ctrlKey || e.metaKey;

  // Ctrl+Z：撤销
  if (ctrl && e.key === 'z') { e.preventDefault(); editorUndo(); }
  // Ctrl+Y / Ctrl+Shift+Z：重做
  if (ctrl && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault(); editorRedo(); }
  // Ctrl+S：保存
  if (ctrl && e.key === 's') { e.preventDefault(); document.getElementById('editorBtnSave').click(); }

  // 单键工具切换
  switch (e.key.toLowerCase()) {
    case 'b': setEditorTool('brush'); break;
    case 'e': setEditorTool('eraser'); break;
    case 'g': setEditorTool('fill'); break;
    case 'i': setEditorTool('picker'); break;
    case 'm': setEditorTool('move'); break;
  }
});

// ============================================
//  13. 应用启动
// ============================================
function init() {
  updateTopbar();

  // 根据 URL hash 初始化页面
  const hash = window.location.hash.replace('#', '') || 'home';
  const parts = hash.split('/');
  currentPage = parts[0];
  pageParams = { id: parts[1] };
  showPage(currentPage);

  // 顶栏快捷按钮
  document.getElementById('btnCreate').onclick = () => navigate('editor');
  document.getElementById('btnLogin').onclick = () => navigate('login');
}

init();
</script>
